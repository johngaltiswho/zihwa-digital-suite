[variables]
NIXPACKS_NO_MUSL = '1'

[phases.setup]
nixPkgs = ['nodejs_20', 'pnpm-9_x']

[phases.install]
cmds = ['pnpm install --frozen-lockfile']

[phases.build]
cmds = [
  'pnpm --filter vendure-backend build',
  'cd apps/vendure-backend && pnpm build:dashboard'
]

[start]
cmd = 'node apps/vendure-backend/dist/index.js'
